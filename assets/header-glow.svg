<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="1" stop-color="#0b1024"/>
    </linearGradient>

    <linearGradient id="glowLine" x1="0" x2="1">
      <stop offset="0" stop-color="#49a3ff" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#49a3ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .h1 { font: 800 40px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e6edf3; }
      .h2 { font: 500 16px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #9fb0c0; }
      .tag { font: 600 13px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #c9d4df; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg2)"/>

  <!-- Ambient particles -->
  <g opacity="0.18">
    <circle cx="140" cy="70" r="2" fill="#49a3ff"/>
    <circle cx="260" cy="140" r="1.6" fill="#7c3aed"/>
    <circle cx="420" cy="40" r="1.4" fill="#49a3ff"/>
    <circle cx="700" cy="150" r="1.8" fill="#7c3aed"/>
    <circle cx="980" cy="60" r="1.5" fill="#49a3ff"/>
    <circle cx="1080" cy="120" r="1.3" fill="#7c3aed"/>
  </g>

  <!-- Animated scanline -->
  <g filter="url(#neon)">
    <rect x="-300" y="160" width="600" height="4" fill="url(#glowLine)">
      <animate attributeName="x" from="-300" to="1200" dur="3.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Soft glow band -->
  <rect x="0" y="150" width="1200" height="1.5" fill="#49a3ff" opacity="0.25">
    <animate attributeName="opacity" values="0.12;0.35;0.12" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Text -->
  <g transform="translate(60,72)">
    <text class="h1">Risa Luthor</text>
    <text class="h2" y="34">Applied AI & Enterprise Systems Engineer — governance-aware automation and observability-first tooling</text>

    <g transform="translate(0,58)">
      <rect x="0" y="0" width="245" height="28" rx="999" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text class="tag" x="14" y="19">FastAPI • Python • Security</text>

      <rect x="260" y="0" width="250" height="28" rx="999" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text class="tag" x="274" y="19">Governance • Auditing • CI</text>

      <rect x="525" y="0" width="260" height="28" rx="999" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text class="tag" x="539" y="19">Deterministic Business Logic</text>
    </g>
  </g>
</svg>
